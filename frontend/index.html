<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱打卡清单 💕</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>恋爱打卡清单</h1>
            <p class="subtitle">记录我们的甜蜜时光</p>
        </header>

        <div class="progress-container">
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="stats">
                <span>已完成 <span class="count" id="completedCount">0</span> 项</span>
                <span>共 <span class="count" id="totalCount">0</span> 项</span>
            </div>
        </div>

        <div class="add-form">
            <input type="text" id="newItem" placeholder="添加一个新的打卡项..." maxlength="100">
            <button id="addBtn">添加</button>
        </div>

        <ul id="itemList" class="item-list">
        </ul>

        <div id="emptyState" class="empty-state">
            <span class="icon">💌</span>
            <p>还没有打卡项，快去添加吧！</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
